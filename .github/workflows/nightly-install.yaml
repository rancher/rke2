name: Nightly Install
on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}
  pull_request:
    paths:
      - '.github/workflows/nightly-install.yaml'

jobs:
  test:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        channel: [stable]
        vm: [centos-9, alma-10, alma-10-with-selinux-tar, opensuse-leap, ubuntu-2404, windows-2022, windows-2025]
        include:
          - {channel: latest, vm: alma-10}
          - {channel: latest, vm: ubuntu-2404}
      max-parallel: 5
    defaults:
      run:
        working-directory: tests/install/${{ matrix.vm }}
    env:
      INSTALL_RKE2_CHANNEL: ${{ matrix.channel }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: {fetch-depth: 1}
      - name: Remove Unnecessary Tools
        run: |
          sudo rm -rf \
            /home/linuxbrew \
            /home/packer \
            /opt/az \
            /opt/microsoft \
            /usr/lib/firefox \
            /usr/lib/google-cloud-sdk \
            /usr/local/julia* \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/az* \
            /usr/share/dotnet \
            /usr/share/miniconda \
            /usr/share/swift
          df -khl
      # Don't cache Windows VMs, they are 5-7GB each, which would eat our entire 10GB cache
      - name: "Vagrant Cache"
        if: ${{ !contains(matrix.vm, 'windows') }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
             ~/.vagrant.d/boxes
          key: vagrant-box-${{ matrix.vm }}
        id: vagrant-cache
        continue-on-error: true
      - name: Set up vagrant and libvirt
        uses: ./.github/actions/vagrant-setup
      - name: "Vagrant Plugin Cache"
        if: ${{ !contains(matrix.vm, 'windows') }}
        id: vagrant-plugin-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.vagrant.d/gems
            ~/.vagrant.d/plugins.json
          key: vagrant-plugins-rke2-0.2.0-reload-0.0.1-libvirt-0.12.2
      - name: "Vagrant Plugin(s)"
        if: ${{ contains(matrix.vm, 'windows') || steps.vagrant-plugin-cache.outputs.cache-hit != 'true' }}
        env:
          VAGRANT_RKE2_VERSION: "0.2.0"
          VAGRANT_RKE2_CHECKSUM: "b91dbeee2e7f35d4849ff149ce3d4bdb35f1e594b5a889c48b28a2fce346277d"
          VAGRANT_RELOAD_VERSION: "0.0.1"
          VAGRANT_RELOAD_CHECKSUM: "aa03d5e52737586bd5dab740c8bc61690e63c75c0d96383d9bea7520fa05be6a"
        run: |
          for plugin in "vagrant-rke2:${VAGRANT_RKE2_VERSION}:${VAGRANT_RKE2_CHECKSUM}" \
                        "vagrant-reload:${VAGRANT_RELOAD_VERSION}:${VAGRANT_RELOAD_CHECKSUM}"; do
            name="${plugin%%:*}"
            rest="${plugin#*:}"
            version="${rest%%:*}"
            checksum="${rest##*:}"
            curl -fsSL "https://rubygems.org/gems/${name}-${version}.gem" -o "${name}.gem"
            echo "${checksum}  ${name}.gem" | sha256sum -c
            vagrant plugin install "${name}.gem"
            rm -f "${name}.gem"
          done
      - name: "Vagrant Up ⏩ Install RKE2"
        run: vagrant up
      - name: "⏳ Node"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-wait-for-cp
      - name: "⏳ Canal"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-wait-for-canal
        continue-on-error: true
      - name: "⏳ CoreDNS"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-wait-for-coredns
        continue-on-error: true
      - name: "⏳ Metrics Server"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-wait-for-metrics-server
        continue-on-error: true
      - name: "⏳ Ingress NGINX"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-wait-for-ingress-nginx
        continue-on-error: true
      - name: "rke2-status"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-status
      - name: "rke2-procps"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-procps
      - name: "rke2-mount-directory"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-mount-directory
      - name: "rke2-killall"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-killall
      - name: "rke2-check-mount"
        if: ${{ !contains(matrix.vm, 'windows') }}
        run: vagrant provision --provision-with=rke2-check-mount
