name: "Version Bump Backport Dispatcher"

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  actions: write

concurrency:
  group: "version-bump-dispatch-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  dispatch:
    name: Dispatch backport workflows
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-slim
    strategy:
      matrix:
        branch: [release-1.33, release-1.34, release-1.35]
      fail-fast: false
    steps:
      - name: Dispatch backport for ${{ matrix.branch }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'version-bump-backport.lock.yml',
              ref: 'master',
              inputs: {
                target_branch: '${{ matrix.branch }}',
                pr_number: String(context.payload.pull_request.number),
              },
            });
            core.info('Dispatched backport workflow for ${{ matrix.branch }} (PR #${{ github.event.pull_request.number }})');
