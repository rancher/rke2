name: Test Suite
on: 
  push:
    paths-ignore:
      - "**.md"
      - "channel.yaml"
      - "install.sh"
      - "updatecli/**"
      - ".github/**"
      - "!.github/workflows/test-suite.yaml"
  pull_request:
    paths-ignore:
      - "**.md"
      - "channel.yaml"
      - "install.sh"
      - "updatecli/**"
      - ".github/**"
      - "!.github/workflows/test-suite.yaml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build RKE2 Images and Binary
    runs-on: ${{ github.repository == 'rancher/rke2' && 'runs-on,runner=16cpu-linux-x64,image=ubuntu24-full-x64' || 'ubuntu-24.04' }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1
    - name: Find Go Version for Build
      id: go-finder
      run: |
        GOOS=linux GOARCH=amd64 . ./scripts/version.sh
        set +x
        VERSION_GOLANG=$(echo $VERSION_GOLANG | sed 's/go//')
        echo "VERSION_GOLANG=${VERSION_GOLANG}" >> "$GITHUB_OUTPUT"
    - name: Install Go
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ steps.go-finder.outputs.VERSION_GOLANG }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    - name: Install OS Packages
      run: sudo apt-get update && sudo apt-get install -y libarchive-tools g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64
    - name: "Read secrets"
      if: github.event_name != 'pull_request' && github.repository == 'rancher/rke2'
      uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # v3
      with:
        secrets: |
          secret/data/github/repo/${{ github.repository }}/rancher-prime-registry/credentials registry | PRIME_REGISTRY ;
    # Can only upload from a single path, so we need to copy the binary to the image directory
    # Additionally, we have a rke2-runtime.tar and a rke2-images.linux-amd64.tar.zst which are the same thing
    # just compressed. We remove the rke2-runtime.tar as its not used by the install script.
    - name: Build RKE2 Binary and Compressed Runtime Image
      run: |
        GOCOVER=true make package-bundle
        make package-image-runtime
        cp ./bin/rke2 ./build/images/rke2
        cp ./dist/artifacts/rke2.*-amd64.tar.gz ./build/images/
        rm ./build/images/rke2-runtime.tar
    - name: Upload RKE2 Binary and Runtime Image
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: rke2-test-artifacts
        path: ./build/images/*
  itest:
    needs: build
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        itest: [startup, etcdsnapshot]
      max-parallel: 3
    env:
      GOCOVERDIR: /tmp/rke2cov
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1
    - name: Install Go
      uses: ./.github/actions/setup-go
    - name: Setup Build Directories
      run: |
        mkdir -p ./bin ./build/images
    - name: Download RKE2 Binary and Runtime Image
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: rke2-test-artifacts
        path: ./build/images
    - name: Setup Binary
      run: |
        mv ./build/images/rke2 ./bin/rke2
        chmod +x ./bin/rke2
    - name: Run Integration Tests
      run: | 
        mkdir -p $GOCOVERDIR
        sudo -E env "PATH=$PATH" go test -timeout=45m ./tests/integration/${{ matrix.itest }}/... -run Integration -ginkgo.v -test.v
    - name: Generate coverage report
      run:  sudo -E env "PATH=$PATH" go tool covdata textfmt -i $GOCOVERDIR -o ${{ matrix.itest }}.out
    - name: Upload Results To Codecov
      uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./${{ matrix.itest }}.out
        flags: inttests # optional
        verbose: true # optional (default = false)
    - name: On Failure, Dump Server Logs
      if: ${{ failure() }}
      run: cat ./tests/integration/${{ matrix.itest }}/r2log.txt
  docker: 
    name: "Docker Tests"
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        dtest: [basics, flannel, profile, ingress-nginx, ing_migration, prime]
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: {fetch-depth: 1}
      - name: Install Go
        uses: ./.github/actions/setup-go
      - name: Download RKE2 Binary and Runtime Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rke2-test-artifacts
          path: ./artifacts
      - name: Place the artifacts back and compute sha256sum
        run: |
          mkdir -p ./dist/artifacts
          mkdir -p ./build/images
          mkdir -p ./bin
          mv ./artifacts/rke2-* ./build/images/
          mv ./artifacts/rke2.*-amd64.tar.gz ./dist/artifacts
          sha256sum ./dist/artifacts/rke2.linux-amd64.tar.gz > ./dist/artifacts/sha256sum-amd64.txt
      - name: Load kernel modules
        run: |
          sudo modprobe br_netfilter overlay
      - name: "Read secrets"
        if: github.event_name == 'push'
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/rancher-prime-registry/credentials registry | PRIME_REGISTRY ;
      - name: Run ${{ matrix.dtest }} Test
        if: matrix.dtest != 'prime'
        run: |
            go test -v -timeout=20m ./tests/docker/${{ matrix.dtest }}/${{ matrix.dtest }}_test.go -ginkgo.v -ci
      - name: Run ${{ matrix.dtest }} Merge Tests
        if: matrix.dtest == 'prime' && github.event_name == 'push'
        run: go test -v -timeout=20m ./tests/docker/${{ matrix.dtest }}/${{ matrix.dtest }}_test.go -ginkgo.v -ci -registry $PRIME_REGISTRY
  
  docker-large:
    name: "Docker Tests (Large)"
    needs: build
    if: github.repository == 'rancher/rke2'
    runs-on: runs-on,runner=8cpu-linux-x64,ram=16+24,image=ubuntu24-full-x64,run-id=${{ github.run_id }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        dtest: [dualstack, secretsencryption, splitserver]
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: {fetch-depth: 1}
      - name: Check Memory
        run: lsmem
      - name: Install Go
        uses: ./.github/actions/setup-go
      - name: Download RKE2 Binary and Runtime Image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rke2-test-artifacts
          path: ./artifacts
      - name: Place the artifacts back and compute sha256sum
        run: |
          mkdir -p ./dist/artifacts
          mkdir -p ./build/images
          mkdir -p ./bin
          mv ./artifacts/rke2-* ./build/images/
          mv ./artifacts/rke2.*-amd64.tar.gz ./dist/artifacts
          sha256sum ./dist/artifacts/rke2.linux-amd64.tar.gz > ./dist/artifacts/sha256sum-amd64.txt
      - name: Load kernel modules
        run: |
          sudo modprobe br_netfilter overlay
      - name: Run ${{ matrix.dtest }} Test
        run: |
          go test -v -timeout=30m ./tests/docker/${{ matrix.dtest }}/${{ matrix.dtest }}_test.go -ginkgo.v -ci
  e2e:
    name: "E2E Tests"
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        etest: [kine, ciliumnokp, multus, calico_ebpf]
      max-parallel: 3
    steps:
    - name: "Checkout"
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with: {fetch-depth: 1}
    - name: Remove Unnecessary Tools
      run: |
        sudo rm -rf \
          /home/linuxbrew \
          /home/packer \
          /opt/az \
          /opt/microsoft \
          /usr/lib/firefox \
          /usr/lib/google-cloud-sdk \
          /usr/local/julia* \
          /usr/local/share/boost \
          /usr/local/share/chromium \
          /usr/local/share/powershell \
          /usr/share/az* \
          /usr/share/dotnet \
          /usr/share/miniconda \
          /usr/share/swift
        df -khl
    - name: Set up vagrant and libvirt
      uses: ./.github/actions/vagrant-setup
    - name: Vagrant R/W Cache
      if: github.ref == 'refs/heads/master'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
            ~/.vagrant.d/boxes
        key: vagrant-box-ubuntu-2404
    - name: Vagrant Read Cache
      if: github.ref != 'refs/heads/master'
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
            ~/.vagrant.d/boxes
        key: vagrant-box-ubuntu-2404
    - name: "Vagrant Plugin(s)"
      env:
        VAGRANT_RKE2_VERSION: "0.2.0"
        VAGRANT_RKE2_CHECKSUM: "b91dbeee2e7f35d4849ff149ce3d4bdb35f1e594b5a889c48b28a2fce346277d"
        VAGRANT_RELOAD_VERSION: "0.0.1"
        VAGRANT_RELOAD_CHECKSUM: "aa03d5e52737586bd5dab740c8bc61690e63c75c0d96383d9bea7520fa05be6a"
        VAGRANT_SCP_VERSION: "0.5.9"
        VAGRANT_SCP_CHECKSUM: "e3adda6c6a059f10e9edfa90a8f08892493010f176a18360a5d92d92847cf329"
      run: |
        for plugin in "vagrant-rke2:${VAGRANT_RKE2_VERSION}:${VAGRANT_RKE2_CHECKSUM}" \
                      "vagrant-reload:${VAGRANT_RELOAD_VERSION}:${VAGRANT_RELOAD_CHECKSUM}" \
                      "vagrant-scp:${VAGRANT_SCP_VERSION}:${VAGRANT_SCP_CHECKSUM}"; do
          name="${plugin%%:*}"
          rest="${plugin#*:}"
          version="${rest%%:*}"
          checksum="${rest##*:}"
          curl -fsSL "https://rubygems.org/gems/${name}-${version}.gem" -o "${name}.gem"
          echo "${checksum}  ${name}.gem" | sha256sum -c
          vagrant plugin install "${name}.gem"
          rm -f "${name}.gem"
        done
    
    - name: Install Go
      uses: ./.github/actions/setup-go
    - name: Install Kubectl
      env:
        KUBECTL_VERSION: "v1.34.6"
        KUBECTL_CHECKSUM: "3166155b17198c0af34ff5a360bd4d9d58db98bafadc6f3c2a57ae560563cd6b"
      run: |
          curl --retry 3 -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o kubectl
          echo "${KUBECTL_CHECKSUM}  kubectl" | sha256sum -c
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          rm -f kubectl
    - name: Download RKE2 Binary and Runtime Image
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: rke2-test-artifacts
        path: ./artifacts
    - name: Place the artifacts back and compute sha256sum
      run: |
        mkdir -p ./dist/artifacts
        mkdir -p ./build/images
        mkdir -p ./bin
        mv ./artifacts/rke2-* ./build/images/
        mv ./artifacts/rke2.*-amd64.tar.gz ./dist/artifacts
        sha256sum ./dist/artifacts/rke2.linux-amd64.tar.gz > ./dist/artifacts/sha256sum-amd64.txt
    - name: Run ${{ matrix.etest }} Test
      run: | 
        cd tests/e2e/${{ matrix.etest }}
        go test -timeout=45m ./${{ matrix.etest}}_test.go -ci -local -ginkgo.v -test.v
