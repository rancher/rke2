# This small test makes sure that updatecli is working properly on a repo.
# To test this:
#   have "UPDATECLI_GITHUB_ACTOR" env set to your github username
#   have "UPDATECLI_GITHUB_TOKEN" env set to your github token
#   have the latest version of updatecli installed
#   'updatecli pipeline diff -v updatecli/values.yaml -c updatecli/updatecli.d/vsphere-csi.yml'
# In the future, more useful files should be added to this directory.
---
name: "Update vsphere csi/cpi charts and images"
# Make sure we can pull in github repos from multiple orgs
scms:
  rke2:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ requiredEnv .github.username }}"
      token: '{{ requiredEnv .github.token }}'
      owner: '{{ .github.owner }}'
      repository: "{{ .github.repo }}"
      branch: master

sources:
  vsphere-csi:
    name: "Get vsphere-csi chart version"
    kind: "shell"
    spec:
      command: bash ./updatecli/scripts/retrieve_chart_version.sh rancher-vsphere-csi
  vsphere-csi-public-driver-tag:
    name: "Get vsphere-csi public driver tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.tag'
  vsphere-csi-public-syncer-tag:
    name: "Get vsphere-csi public syncer tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.vsphereSyncer.tag'
  vsphere-csi-public-registrar-tag:
    name: "Get vsphere-csi public node driver registrar tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiNode.image.nodeDriverRegistrar.tag'
  vsphere-csi-public-resizer-tag:
    name: "Get vsphere-csi public resizer tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.csiResizer.tag'
  vsphere-csi-public-liveness-tag:
    name: "Get vsphere-csi public livenessprobe tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.livenessProbe.tag'
  vsphere-csi-public-attacher-tag:
    name: "Get vsphere-csi public attacher tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.csiAttacher.tag'
  vsphere-csi-public-provisioner-tag:
    name: "Get vsphere-csi public provisioner tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-csi/rancher-vsphere-csi-{{ source "vsphere-csi" }}.tgz" \
          | tar xzO rancher-vsphere-csi/values.yaml \
          | yq -r '.versionOverrides[0].values.csiController.image.csiProvisioner.tag'
  
targets:
  updateVsphereCSI:
    name: "Update the vsphere-csi airgap images"
    kind: "shell"
    scmid: "rke2"
    sourceid: vsphere-csi
    spec:
      command: bash ./updatecli/scripts/update_chart_and_images_prime.sh rancher-vsphere-csi {{ source "vsphere-csi" }}
      changedif:
        kind: file/checksum
        spec:
          files:
            - charts/chart_versions.yaml
  updateVsphereCSIPublicImages:
    name: "Update public vsphere-csi tags in scripts/build-images docker.io images-vsphere block"
    kind: "file"
    scmid: "rke2"
    sourceid: vsphere-csi-public-driver-tag
    spec:
      file: scripts/build-images
      matchpattern: '(?ms)[ \t]*\$\{REGISTRY\}/rancher/mirrored-cloud-provider-vsphere-csi-release-driver:.*?\nEOF'
      replacepattern: |2-
            $${REGISTRY}/rancher/mirrored-cloud-provider-vsphere-csi-release-driver:{{ source "vsphere-csi-public-driver-tag" }}
            $${REGISTRY}/rancher/mirrored-cloud-provider-vsphere-csi-release-syncer:{{ source "vsphere-csi-public-syncer-tag" }}
            $${REGISTRY}/rancher/mirrored-sig-storage-csi-node-driver-registrar:{{ source "vsphere-csi-public-registrar-tag" }}
            $${REGISTRY}/rancher/mirrored-sig-storage-csi-resizer:{{ source "vsphere-csi-public-resizer-tag" }}
            $${REGISTRY}/rancher/mirrored-sig-storage-livenessprobe:{{ source "vsphere-csi-public-liveness-tag" }}
            $${REGISTRY}/rancher/mirrored-sig-storage-csi-attacher:{{ source "vsphere-csi-public-attacher-tag" }}
            $${REGISTRY}/rancher/mirrored-sig-storage-csi-provisioner:{{ source "vsphere-csi-public-provisioner-tag" }}
            $${REGISTRY}/rancher/hardened-csi-snapshotter:v8.6.0-build20260708
        EOF

actions:
  github:
    kind: "github/pullrequest"
    scmid: "rke2"
    spec:
      merge:
        strategy: manual
      draft: false
      mergemethod: squash
      parent: false
      title: "Update vsphere-csi chart"
