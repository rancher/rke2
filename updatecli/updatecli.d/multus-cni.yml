---
name: "Update Multus charts and images"
# Make sure we can pull in github repos from multiple orgs
scms:
  rke2:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ requiredEnv .github.username }}"
      token: '{{ requiredEnv .github.token }}'
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repo }}"
      branch: master

sources:
  multus:
    name: "Get Multus chart version"
    kind: "helmchart"
    spec:
      url: https://rancher.github.io/rke2-charts
      name: rke2-multus
      versionfilter:
        kind: "latest"
  issue:
    name: "Get issue number"
    kind: "shell"
    spec:
      command: bash ./updatecli/scripts/create-issue.sh rke2-multus {{ source "multus" }}
      environments:
        - name: GH_TOKEN
          value: '{{ requiredEnv .github.token }}'
  
conditions:
  multusVersionShouldBeUpdated:
    name: "Check if Multus chart should be updated or not"
    kind: shell
    sourceid: multus
    spec:
      command: bash ./updatecli/scripts/validate_version.sh rke2-multus

targets:
  multusCNI:
    name: "Update the Multus airgap images"
    kind: "shell"
    scmid: "rke2"
    sourceid: multus
    spec:
      command: bash ./updatecli/scripts/update_chart_and_images_cni.sh rke2-multus

actions:
  github:
    kind: "github/pullrequest"
    scmid: "rke2"
    spec:
      automerge: false
      draft: false
      mergemethod: squash
      parent: false
      title: 'Update Multus chart to {{ source "multus" }}'
      description: 'This is an automated PR to update Helm chart versions. issue #{{ source "issue" }}'
