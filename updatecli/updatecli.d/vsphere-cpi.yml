# This small test makes sure that updatecli is working properly on a repo.
# To test this:
#   have "UPDATECLI_GITHUB_ACTOR" env set to your github username
#   have "UPDATECLI_GITHUB_TOKEN" env set to your github token
#   have the latest version of updatecli installed
#   'updatecli diff -v updatecli/values.yaml -c updatecli/updatecli.d/vsphere-cpi.yml'
# In the future, more useful files should be added to this directory.
---
name: "Update vsphere csi/cpi charts and images"
# Make sure we can pull in github repos from multiple orgs
scms:
  rke2:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ requiredEnv .github.username }}"
      token: '{{ requiredEnv .github.token }}'
      owner: '{{ .github.owner }}'
      repository: "{{ .github.repo }}"
      branch: master

sources:
  vsphere-cpi:
    name: "Get vsphere-cpi chart version"
    kind: "shell"
    spec:
      command: bash ./updatecli/scripts/retrieve_chart_version.sh rancher-vsphere-cpi
  vsphere-cpi-public-tag:
    name: "Get vsphere-cpi public image tag"
    kind: "shell"
    spec:
      command: |
        curl -sfL "https://github.com/rancher/rke2-charts/raw/main/assets/rancher-vsphere-cpi/rancher-vsphere-cpi-{{ source "vsphere-cpi" }}.tgz" \
          | tar xzO rancher-vsphere-cpi/values.yaml \
          | yq -r '.versionOverrides[0].values.cloudControllerManager.tag'
  
targets:
  updateVsphereCPI:
    name: "Update the vsphere-cpi airgap images"
    kind: "shell"
    scmid: "rke2"
    sourceid: vsphere-cpi
    spec:
      command: bash ./updatecli/scripts/update_chart_and_images_prime.sh rancher-vsphere-cpi {{ source "vsphere-cpi" }}
      changedif:
        kind: file/checksum
        spec:
          files:
            - charts/chart_versions.yaml

  updateVsphereCPIPublicImage:
    name: "Update mirrored cloud-provider-vsphere tag in scripts/build-images"
    kind: "file"
    scmid: "rke2"
    sourceid: vsphere-cpi-public-tag
    spec:
      file: scripts/build-images
      matchpattern: '(?m)^[ \t]*\$\{REGISTRY\}/rancher/mirrored-cloud-provider-vsphere:.*$'
      replacepattern: '    $${REGISTRY}/rancher/mirrored-cloud-provider-vsphere:{{ source "vsphere-cpi-public-tag" }}'

actions:
  github:
    kind: "github/pullrequest"
    scmid: "rke2"
    spec:
      merge:
        strategy: auto
      draft: false
      mergemethod: squash
      parent: false
      title: "Update vsphere-cpi chart"
