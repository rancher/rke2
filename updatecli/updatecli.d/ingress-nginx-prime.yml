---
name: "Update ingress-nginx chart and prime image"
# Keeps the rke2-ingress-nginx chart version (charts/chart_versions.yaml) and the
# ingress-nginx prime image tag (scripts/build-images) in sync with upstream:
#
#   * chart version  <- latest rke2-ingress-nginx chart published to rke2-charts
#   * prime image    <- latest -primeN release (CVE rebuild) of the pinned nginx
#                       hardened line in rancher/ingress-nginx
#
# Both version patterns are pinned to the current nginx line on purpose, so a
# nginx minor/patch bump stays a deliberate human change. When that line is
# bumped, update the two versionfilter patterns below.
#
# To test locally:
#   have "UPDATECLI_GITHUB_ACTOR" env set to your github username
#   have "UPDATECLI_GITHUB_TOKEN" env set to your github token
#   updatecli diff --values updatecli/values.yaml --config updatecli/updatecli.d/ingress-nginx-prime.yml
scms:
  rke2:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ requiredEnv .github.username }}"
      token: '{{ requiredEnv .github.token }}'
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repo }}"
      branch: master

sources:
  chart:
    name: "Get rke2-ingress-nginx chart version"
    kind: "helmchart"
    spec:
      url: https://rancher.github.io/rke2-charts
      name: rke2-ingress-nginx
      versionfilter:
        kind: "regex"
        # rke2-ingress-nginx chart on the nginx v1.15 (upstream chart 4.15) line
        pattern: '^4\.15\.\d+$'
  prime:
    name: "Get latest ingress-nginx prime image tag"
    kind: "githubrelease"
    spec:
      owner: rancher
      repository: ingress-nginx
      token: '{{ requiredEnv .github.token }}'
      username: '{{ requiredEnv .github.username }}'
      # Only consider published releases - never drafts or pre-releases.
      typefilter:
        release: true
        draft: false
        prerelease: false
      versionfilter:
        kind: "regex"
        # -primeN CVE rebuilds of the pinned nginx v1.15.1 hardened line
        pattern: 'v1\.15\.1-prime[0-9]+'

conditions:
  ingressNginxEntry:
    name: "Verify chart_versions.yaml entry position"
    kind: "yaml"
    disablesourceinput: true
    spec:
      file: charts/chart_versions.yaml
      # Guard the positional key below: if the entry ever moves, the condition
      # fails and the chart-version target is safely skipped instead of editing
      # the wrong chart.
      key: '$.charts[5].filename'
      value: /charts/rke2-ingress-nginx.yaml
verifyPrimeInChartValues:
    name: "Verify prime image is contained in the source chart's values.yaml"
    kind: "helmchart"
    disablesourceinput: true
    spec:
      url: "https://rancher.github.io/rke2-charts"
      name: "rke2-ingress-nginx"
      version: '{{ source "chart" }}'
      file: "values.yaml"
      key: "primeTag"
      value: '{{ source "prime" }}'
      
targets:
  chartVersion:
    name: "Update rke2-ingress-nginx version in charts/chart_versions.yaml"
    kind: "yaml"
    scmid: "rke2"
    sourceid: chart
    spec:
      file: charts/chart_versions.yaml
      key: '$.charts[5].version'
  buildImages:
    name: "Update INGRESS_NGINX_PRIME_TAG in scripts/build-images"
    kind: "file"
    scmid: "rke2"
    sourceid: prime
    spec:
      file: scripts/build-images
      matchpattern: 'INGRESS_NGINX_PRIME_TAG=.*'
      replacepattern: 'INGRESS_NGINX_PRIME_TAG={{ source "prime" }}'

actions:
  github:
    kind: "github/pullrequest"
    scmid: "rke2"
    spec:
      merge:
        strategy: manual
      draft: false
      mergemethod: squash
      parent: false
      title: 'Update ingress-nginx to chart {{ source "chart" }} / image {{ source "prime" }}'
      description: |
        This is an automated PR to keep ingress-nginx in sync with upstream.

        - `rke2-ingress-nginx` chart -> `{{ source "chart" }}` (charts/chart_versions.yaml)
        - prime image tag -> `{{ source "prime" }}` (scripts/build-images:
          rancher/nginx-ingress-controller and rancher/kube-webhook-certgen)
